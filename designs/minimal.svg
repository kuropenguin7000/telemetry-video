<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 405 720" font-family="Segoe UI">
  <defs>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- clock, top-center -->
  <text x="202.5" y="66" text-anchor="middle" font-size="15" font-weight="500"
        letter-spacing="3.5" fill="#ffffff" fill-opacity="0.92"
        filter="url(#soft)">{{ clock24 }}</text>

  <!-- lower cluster lifted up to clear the bottom caption bar -->
  <g transform="translate(0 -28)">

  <!-- speed ring (lower third, centered) -->
  <g filter="url(#soft)">
    <circle cx="202.5" cy="452" r="84" fill="none" stroke="#ffffff"
            stroke-opacity="0.15" stroke-width="3"/>
    <circle cx="202.5" cy="452" r="84" fill="none" stroke="#57D9C6" stroke-width="5"
            stroke-linecap="round" transform="rotate(-90 202.5 452)"
            stroke-dasharray="{{ clamp(speed/40,0,1)*527.79 | .1f }} 527.79"/>
  </g>
  <text x="202.5" y="448" text-anchor="middle" dominant-baseline="central"
        font-size="80" font-weight="300" fill="#ffffff"
        filter="url(#soft)">{{ speed | .0f }}</text>
  <text x="202.5" y="502" text-anchor="middle" font-size="13" font-weight="600"
        letter-spacing="4.5" fill="#ffffff" fill-opacity="0.72"
        filter="url(#soft)">KM/H</text>

  <!-- hairline stat row: DIST | HR | ELEV -->
  <g stroke="#ffffff" stroke-opacity="0.18">
    <line x1="149" y1="590" x2="149" y2="624"/>
    <line x1="256" y1="590" x2="256" y2="624"/>
  </g>
  <g text-anchor="middle" fill="#ffffff" filter="url(#soft)">
    <text x="96"  y="606" font-size="27" font-weight="400">{{ dist_km | .1f }}</text>
    <text x="202.5" y="606" font-size="27" font-weight="400">{{ hr | .0f }}</text>
    <text x="309" y="606" font-size="27" font-weight="400">{{ ele | .0f }}</text>
  </g>
  <g text-anchor="middle" fill="#ffffff" fill-opacity="0.55" font-size="10.5"
     font-weight="600" letter-spacing="2">
    <text x="96"  y="624">KM</text>
    <text x="202.5" y="624">BPM</text>
    <text x="309" y="624">M</text>
  </g>

  </g>
</svg>
